<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de NDA — Altum Capital</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d1621 0%, #111e2e 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif;
      padding: 32px 16px;
    }
    .card {
      background: #1B2B45;
      border: 1px solid rgba(184,147,82,0.25);
      border-radius: 4px;
      width: 100%; max-width: 540px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      overflow: hidden;
    }
    .card-header {
      padding: 32px 36px 24px;
      border-bottom: 1px solid rgba(184,147,82,0.2);
      position: relative;
    }
    .logo-line { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .logo-mark {
      width: 30px; height: 30px;
      border: 1.5px solid #B89352; border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-mark span { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 700; color: #B89352; }
    .logo-text { font-size: 11px; font-weight: 500; letter-spacing: 3px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
    .card-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .card-subtitle { font-size: 13px; color: rgba(255,255,255,0.4); font-weight: 300; }
    .gear-btn {
      position: absolute; top: 30px; right: 30px;
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.3); font-size: 20px; line-height: 1;
      transition: color 0.2s; padding: 4px;
    }
    .gear-btn:hover, .gear-btn.active { color: #B89352; }
    .card-body { padding: 28px 36px 32px; }
    .settings-panel {
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(184,147,82,0.15);
      border-radius: 3px; padding: 18px; margin-bottom: 24px;
    }
    .settings-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #B89352; font-weight: 500; margin-bottom: 14px; }
    .field { margin-bottom: 18px; }
    .field:last-child { margin-bottom: 0; }
    label {
      display: block; font-size: 11px; font-weight: 500;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.45); margin-bottom: 8px;
    }
    label .req { color: #B89352; margin-left: 2px; }
    input {
      width: 100%;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px; color: #fff;
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      padding: 11px 14px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: rgba(184,147,82,0.6); box-shadow: 0 0 0 3px rgba(184,147,82,0.08); }
    input::placeholder { color: rgba(255,255,255,0.2); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .divider { height: 1px; background: rgba(255,255,255,0.07); margin: 22px 0; }
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #B89352, #9a7a41);
      border: none; border-radius: 3px; color: #fff;
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 14px; cursor: pointer; transition: opacity 0.2s;
    }
    .btn-submit:hover { opacity: 0.88; }
    .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; }
    .status-box {
      border-radius: 3px; padding: 14px 16px; font-size: 13px;
      margin-top: 16px; display: flex; gap: 10px; align-items: flex-start;
      line-height: 1.5;
    }
    .status-ok { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    .status-err { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.25); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    .onboarding {
      background: rgba(184,147,82,0.08);
      border-bottom: 1px solid rgba(184,147,82,0.2);
      padding: 16px 28px;
      position: relative;
    }
    .ob-steps {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap;
    }
    .ob-step {
      display: flex; align-items: center; gap: 8px;
      flex: 1; min-width: 120px;
    }
    .ob-icon {
      font-size: 13px; color: #B89352; font-weight: 700;
      font-family: 'Cormorant Garamond', serif; flex-shrink: 0;
    }
    .ob-text { font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.4; }
    .ob-text strong { color: rgba(255,255,255,0.8); }
    .ob-arrow { color: rgba(184,147,82,0.4); font-size: 14px; flex-shrink: 0; }
    .ob-close {
      position: absolute; top: 10px; right: 14px;
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.2); font-size: 12px;
      transition: color 0.2s;
    }
    .ob-close:hover { color: rgba(255,255,255,0.5); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="logo-line">
        <div class="logo-mark"><span>A</span></div>
        <span class="logo-text">Altum Capital</span>
      </div>
      <div class="card-title">Gerador de NDA</div>
      <div class="card-subtitle">Preencha os dados — o envio para Anna é automático.</div>
      <button class="gear-btn" id="gearBtn" title="Configurações de envio">⚙</button>
    </div>
    <div class="onboarding" id="onboarding">
      <div class="ob-steps">
        <div class="ob-step">
          <div class="ob-icon">①</div>
          <div class="ob-text">Preencha os dados da contraparte nos campos abaixo</div>
        </div>
        <div class="ob-arrow">→</div>
        <div class="ob-step">
          <div class="ob-icon">②</div>
          <div class="ob-text">Clique em <strong>Gerar e Enviar NDA</strong></div>
        </div>
        <div class="ob-arrow">→</div>
        <div class="ob-step">
          <div class="ob-icon">③</div>
          <div class="ob-text">Anna recebe as instruções e faz o upload no <strong>ZapSign</strong> — JV fica em cópia</div>
        </div>
      </div>
      <button class="ob-close" onclick="fecharOnboarding()" title="Fechar">✕</button>
    </div>
    <div class="card-body">
      <div class="settings-panel hidden" id="settingsPanel">
        <div class="settings-title">Configurações de Envio</div>
        <div class="field">
          <label>E-mail destino (responsável ZapSign)</label>
          <input type="email" id="cfgDest" value="anna.nascimento@altumcapital.com.br" />
        </div>
        <div class="field">
          <label>E-mail em cópia (CC)</label>
          <input type="email" id="cfgCC" value="jv@altumcapital.com.br" />
        </div>
      </div>
      <div class="field">
        <label>Razão Social ou Nome Completo <span class="req">*</span></label>
        <input type="text" id="razaoSocial" placeholder="Ex: Empresa XYZ Ltda." />
      </div>
      <div class="field">
        <label>CPF ou CNPJ</label>
        <input type="text" id="cnpjCpf" placeholder="Opcional" />
      </div>
      <div class="divider"></div>
      <div class="row">
        <div class="field">
          <label>Representante <span class="req">*</span></label>
          <input type="text" id="representante" placeholder="Nome completo" />
        </div>
        <div class="field">
          <label>Cargo</label>
          <input type="text" id="cargo" placeholder="Rep. Legal" />
        </div>
      </div>
      <div class="field">
        <label>E-mail do representante <span class="req">*</span></label>
        <input type="email" id="emailRep" placeholder="nome@empresa.com.br" />
      </div>
      <div class="divider"></div>
      <button class="btn-submit" id="btnSubmit" onclick="enviarNDA()">
        Gerar e Enviar NDA
      </button>
      <div class="status-box status-ok hidden" id="statusOk"></div>
      <div class="status-box status-err hidden" id="statusErr"></div>
    </div>
  </div>
  <script>
    function fecharOnboarding() {
      document.getElementById('onboarding').style.display = 'none';
    }
    document.getElementById('gearBtn').addEventListener('click', function() {
      const panel = document.getElementById('settingsPanel');
      panel.classList.toggle('hidden');
      this.classList.toggle('active');
    });
    async function enviarNDA() {
      const razaoSocial   = document.getElementById('razaoSocial').value.trim();
      const cnpjCpf       = document.getElementById('cnpjCpf').value.trim() || 'Não informado';
      const representante = document.getElementById('representante').value.trim();
      const cargo         = document.getElementById('cargo').value.trim() || 'Representante Legal';
      const emailRep      = document.getElementById('emailRep').value.trim();
      const dest          = document.getElementById('cfgDest').value.trim();
      const cc            = document.getElementById('cfgCC').value.trim();
      const okBox  = document.getElementById('statusOk');
      const errBox = document.getElementById('statusErr');
      const btn    = document.getElementById('btnSubmit');
      okBox.classList.add('hidden');
      errBox.classList.add('hidden');
      if (!razaoSocial || !representante || !emailRep) {
        errBox.innerHTML = '✕  Preencha os campos obrigatórios marcados com *.';
        errBox.classList.remove('hidden');
        return;
      }
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Enviando...';
      const emailBody = `Olá, Anna!

Segue abaixo os dados da contraparte para preenchimento e envio do NDA via ZapSign:

━━━━━━━━━━━━━━━━━━━━━━
DADOS DA CONTRAPARTE
━━━━━━━━━━━━━━━━━━━━━━

• Razão Social / Nome: ${razaoSocial}
• CPF / CNPJ: ${cnpjCpf}
• Representante: ${representante}
• Cargo: ${cargo}
• E-mail: ${emailRep}

━━━━━━━━━━━━━━━━━━━━━━

Por favor:
1. Abra o modelo de NDA padrão da Altum
2. Preencha com os dados acima
3. Faça upload no ZapSign com os seguintes signatários:
   → ${representante} (${emailRep})
   → João Victor Beze (jv@altumcapital.com.br)

Obrigado!
A. Financial Ltda.`;
      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{
              role: 'user',
              content: `Send this email via Gmail exactly as written:\n\nTo: ${dest}\nCC: ${cc}\nSubject: NDA — ${razaoSocial} | Preencher e enviar via ZapSign\nBody:\n${emailBody}`
            }],
            mcp_servers: [{ type: 'url', url: 'https://gmail.mcp.claude.com/mcp', name: 'gmail-mcp' }]
          })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        const hasResult = data.content?.some(b => b.type === 'mcp_tool_result');
        const txt = data.content?.filter(b => b.type === 'text').map(b => b.text).join(' ').toLowerCase() || '';
        if (hasResult || txt.includes('sent') || txt.includes('enviado')) {
          okBox.innerHTML = `✓  E-mail enviado para <strong>${dest}</strong> com CC para <strong>${cc}</strong>. Anna receberá as instruções para preencher e enviar via ZapSign.`;
          okBox.classList.remove('hidden');
          ['razaoSocial','cnpjCpf','representante','cargo','emailRep'].forEach(id => {
            document.getElementById(id).value = '';
          });
        } else {
          throw new Error('Não foi possível confirmar o envio. Tente novamente.');
        }
      } catch (e) {
        errBox.innerHTML = '✕  ' + (e.message || 'Erro desconhecido.');
        errBox.classList.remove('hidden');
      }
      btn.disabled = false;
      btn.innerHTML = 'Gerar e Enviar NDA';
    }
  </script>
</body>
</html>
